<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Task</title>
    <style>
        img{
            border: 2px solid red;
        }
    </style>
</head>
<body>
    
    <h1>Multimedia Task</h1>
    <hr>
    <h2>Image Task</h2>
    <img src="./medias/doremon.jpeg" alt="doraemon" height="200px" width="300px">
    <hr>
    <h2>Audio Task</h2>
    <audio src="./medias/Aaya Re Toofan Chhaava 128 Kbps.mp3" controls autoplay muted ></audio>
    <hr>
    <h2>Video Task</h2>
    <video 
       src="./medias/857045-hd_1920_1080_30fps.mp4" 
       controls height="200px" 
       autoplay 
       poster="./medias/doremon.jpeg">
    </video>
    <hr>
    <h2>embed tag</h2>
    <embed src="./medias/doremon.jpeg" type="" />
    <embed src="./medias/Aaya Re Toofan Chhaava 128 Kbps.mp3" type="" />
    <embed src="./medias/857045-hd_1920_1080_30fps.mp4" type="">
</body>
</html>
